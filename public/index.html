<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Duplex Voice Demo</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="status-bar">
        <div>
          <h1>Duplex Voice Demo</h1>
          <p id="health">checking</p>
        </div>
        <div class="controls">
          <button id="startBtn" type="button">Start</button>
          <button id="stopBtn" type="button" disabled>Stop</button>
          <button id="resetBtn" type="button">Reset</button>
        </div>
      </section>

      <section class="meters">
        <label>
          <span>Mic</span>
          <meter id="level" min="0" max="1" value="0"></meter>
        </label>
        <div id="state" class="state">idle</div>
      </section>
      <div id="modeHint" class="mode-hint"></div>

      <section class="demo-tools">
        <strong>Demo tool phrases</strong>
        <span>“打开地图”</span>
        <span>“设置终点北京南站”</span>
        <span>“导航到北京南站”</span>
        <span>“导航到我的办公室”</span>
      </section>

      <section class="debug-grid" aria-label="debug panels">
        <article class="panel">
          <div class="panel__head">
            <strong>Runtime prompts</strong>
            <button id="saveSettingsBtn" type="button">Save</button>
          </div>
          <label class="stacked">
            <span>Main system_role</span>
            <textarea id="systemRoleInput" rows="7"></textarea>
          </label>
          <label class="stacked">
            <span>speaking_style</span>
            <textarea id="speakingStyleInput" rows="3"></textarea>
          </label>
          <p id="settingsStatus" class="panel-note">Changes apply to next Start.</p>
        </article>

        <article class="panel">
          <div class="panel__head">
            <strong>Session flow</strong>
            <button id="clearFlowBtn" type="button">Clear</button>
          </div>
          <div id="flowLog" class="flow-log"></div>
        </article>

        <article class="panel panel--wide">
          <div class="panel__head">
            <strong>Tool registry</strong>
          </div>
          <div id="toolsPanel" class="tools-panel"></div>
        </article>
      </section>

      <section class="transcript" id="log"></section>
    </main>
    <aside class="floating-meter" aria-label="microphone monitor">
      <div class="floating-meter__label">Mic monitor</div>
      <div class="floating-meter__track">
        <div id="floatingLevel" class="floating-meter__bar"></div>
      </div>
      <div id="floatingLevelText" class="floating-meter__value">0%</div>
    </aside>
    <script type="module" src="/app.js"></script>
  </body>
</html>
